<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kkachi — Hanja Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #13131a;
      --border:    #2a2a38;
      --accent:    #c9a84c;
      --accent-dim:#7a6230;
      --text:      #e8e4d9;
      --muted:     #7a7870;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .vert-rule {
      position: fixed;
      top: 0; bottom: 0; left: 3.5rem;
      width: 1px;
      background: var(--border);
      z-index: 1;
    }

    header {
      position: relative;
      z-index: 2;
      padding: 2rem 6rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .logo-hangul {
      font-family: 'Noto Serif KR', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      text-shadow: 0 0 40px rgba(201,168,76,0.2);
    }

    .breadcrumb {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .breadcrumb a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb .sep { color: var(--border); }
    .breadcrumb .current { color: var(--accent-dim); }

    .page-hero {
      position: relative;
      z-index: 2;
      padding: 2.5rem 6rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 300;
    }

    .page-title em { font-style: italic; color: var(--accent); }

    .page-sub {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-top: 0.5rem;
    }

    .section {
      position: relative;
      z-index: 2;
      padding: 2.5rem 6rem 1.5rem;
    }

    .section-label {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .placeholder {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.9;
      letter-spacing: 0.05em;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
    }

    .placeholder .hanja-large {
      font-family: 'Noto Serif KR', serif;
      font-size: 4rem;
      color: var(--border);
      display: block;
      margin-bottom: 1.5rem;
      line-height: 1;
    }

    footer {
      position: relative;
      z-index: 2;
      padding: 2rem 6rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer p {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .footer-hangul {
      font-family: 'Noto Serif KR', serif;
      font-size: 1rem;
      color: var(--border);
    }

    @media (max-width: 700px) {
      header, .page-hero, .section, footer {
        padding-left: 5rem;
        padding-right: 1.5rem;
      }
      .vert-rule { left: 2rem; }
    }
  </style>
</head>
<body>

  <div class="vert-rule"></div>

  <header>
    <a class="logo-hangul" href="../index.html">까치</a>
    <nav class="breadcrumb">
      <a href="../index.html">Home</a>
      <span class="sep">→</span>
      <span class="current">Hanja Study</span>
    </nav>
  </header>

  <div class="page-hero">
    <h1 class="page-title">Hanja <em>Study</em></h1>
    <p class="page-sub">Under construction</p>
  </div>

  <section class="section">
    <div class="section-label">Coming Soon</div>
    <div class="placeholder">
      <span class="hanja-large">漢字</span>
      Dedicated Hanja character study decks are under development.<br />
      In the meantime, Hanja appears as the third side of applicable flashcards in the Korean Study decks.
    </div>
  </section>

  <footer>
    <p>까치 · ravencaller213.github.io/kr-flash</p>
    <span class="footer-hangul">학습</span>
  </footer>

</body>
</html>
